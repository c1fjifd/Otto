<body>
  <div id="root"></div>

  <!-- OTTO Reviews + Secure Strip — injected after React mounts, only on /oferta -->
  <script>
    (function () {
      var reviews = [
        {

          author: "Klaus M.",

          title: "Hervorragender Service, Produkt in perfektem Zustand",
          body: "Das iPhone kam versiegelt und makellos an. Der Ablauf war klar und die Lieferung sehr schnell. Absolut empfehlenswert.",
          stars: 5
        },
        {
          avatar: "assets/review-03-DIHmrGvX.jpg",
          author: "Sabine R.",
          date: "4. Februar 2025",
          title: "Neu und original erhalten",
          body: "Ich hatte zunächst Zweifel, aber das iPhone kam neu und versiegelt an. Qualität und Verpackung waren einwandfrei.",
          stars: 5
        },
        {
          avatar: "assets/review-04-BKG-JKqp.jpg",
          author: "Thomas W.",
          date: "19. Januar 2025",
          title: "Wie versprochen geliefert",
          body: "Neu, versiegelt und gut verpackt. Der Rabatt wurde nach dem Fragebogen aktiviert – alles hat reibungslos funktioniert.",
          stars: 5
        },
        {
          avatar: "assets/review-05-Ci56oVtO.jpg",
          author: "Monika H.",
          date: "8. Januar 2025",
          title: "Toller Kauf, sehr zufrieden",
          body: "Sehr zufrieden mit der Bestellung. Das iPhone kam neu und gut geschützt. Die beste Kamera, die ich je hatte.",
          stars: 5
        },
        {
          avatar: "assets/review-06-BK29CB4O.jpg",
          author: "Stefan B.",
          date: "22. Dezember 2024",
          title: "Schnelle Lieferung, echtes Produkt",
          body: "Schnelle Lieferung und originales Produkt. Sehr gute Kauferfahrung – ich würde es jederzeit wieder tun.",
          stars: 5
        },
        {
          avatar: "assets/review-02-BhVqKCd-.jpg",
          author: "Petra K.",
          date: "11. Dezember 2024",
          title: "Ich bin begeistert",
          body: "Ich kam von einem älteren Modell und der Unterschied ist enorm. Display und Akku sind fantastisch. Alles lief einwandfrei.",
          stars: 5
        }
      ];

      var secureItems = [
        { icon: "✓", text: "Sicherer Kauf auf Rechnung" },
        { icon: "↩", text: "30 Tage kostenlose Rücksendung" },
        { icon: "🔒", text: "Zahlung 100 % geschützt" },
        { icon: "🚚", text: "Schnelle Lieferung in 24–48 Std." }
      ];

      var bars = [
        { label: "5 Sterne", pct: 93, count: 318 },
        { label: "4 Sterne", pct: 4,  count: 13  },
        { label: "3 Sterne", pct: 1,  count: 4   },
        { label: "2 Sterne", pct: 1,  count: 2   },
        { label: "1 Stern",  pct: 2,  count: 7   }
      ];

      function starsHTML(n) {
        var s = "";
        for (var i = 0; i < n; i++) s += '<span class="otto-review-star">★</span>';
        return s;
      }

      function buildReviewsBlock() {
        var barsHTML = bars.map(function (b) {
          return '<div class="otto-bar-row">' +
            '<span class="otto-bar-label">' + b.label + '</span>' +
            '<div class="otto-bar-track"><div class="otto-bar-fill" style="width:' + b.pct + '%"></div></div>' +
            '<span class="otto-bar-count">(' + b.count + ')</span>' +
            '</div>';
        }).join('');

        var reviewItems = reviews.map(function (r) {
          return '<li class="otto-review-item">' +
            '<div class="otto-review-top">' +
            '<img class="otto-review-avatar" src="' + r.avatar + '" alt="' + r.author + '" loading="lazy">' +
            '<div class="otto-review-meta">' +
            '<p class="otto-review-author">' + r.author + '</p>' +
            '<span class="otto-review-date">' + r.date + '</span>' +
            '</div>' +
            '</div>' +
            '<div class="otto-review-stars">' + starsHTML(r.stars) + '</div>' +
            '<p class="otto-review-title">' + r.title + '</p>' +
            '<p class="otto-review-body">' + r.body + '</p>' +
            '<span class="otto-verified-badge"> Verifizierter Kauf</span>' +
            '</li>';
        }).join('');

        var secureHTML = secureItems.map(function (s) {
          return '<div class="otto-secure-row"><span class="otto-secure-icon">' + s.icon + '</span><span>' + s.text + '</span></div>';
        }).join('');

        return {
          reviews: '<div id="otto-reviews">' +
            '<div class="otto-reviews-header"><h2>Kundenbewertungen</h2></div>' +
            '<div class="otto-reviews-summary">' +
            '<div class="otto-rating-block">' +
            '<span class="otto-rating-big">4.8</span>' +
            '<div class="otto-stars-row"><span class="otto-star">★</span><span class="otto-star">★</span><span class="otto-star">★</span><span class="otto-star">★</span><span class="otto-star">★</span></div>' +
            '<span class="otto-rating-count">(344 Bewertungen)</span>' +
            '<span class="otto-recommend">✓ 96 % empfehlen</span>' +
            '</div>' +
            '<div class="otto-bars">' + barsHTML + '</div>' +
            '</div>' +
            '<ul class="otto-review-list">' + reviewItems + '</ul>' +
            '</div>',
          secure: '<div id="otto-secure-strip">' + secureHTML + '</div>'
        };
      }

      function inject() {
        var path = window.location.pathname;
        if (path !== '/oferta' && path !== '/oferta/') return;

        var root = document.getElementById('root');
        if (!root) return;

        // Avoid double injection
        if (document.getElementById('otto-reviews')) return;

        var blocks = buildReviewsBlock();
        var wrapper = document.createElement('div');
        wrapper.id = 'otto-injected-blocks';
        wrapper.style.cssText = 'max-width:680px;margin:0 auto;padding:0 16px 40px;';
        wrapper.innerHTML = blocks.reviews + blocks.secure;
        root.parentNode.insertBefore(wrapper, root.nextSibling);
      }

      // Run after React hydrates (small delay to ensure router has mounted)
      function tryInject() {
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          setTimeout(inject, 300);
        } else {
          document.addEventListener('DOMContentLoaded', function () {
            setTimeout(inject, 300);
          });
        }
      }

      tryInject();

      // Also watch for route changes (SPA navigation via History API)
      var _pushState = history.pushState;
      var _replaceState = history.replaceState;

      history.pushState = function () {
        _pushState.apply(history, arguments);
        setTimeout(function () {
          // Remove old injection if navigated away
          var old = document.getElementById('otto-injected-blocks');
          if (old) old.remove();
          inject();
        }, 350);
      };

      history.replaceState = function () {
        _replaceState.apply(history, arguments);
        setTimeout(function () {
          var old = document.getElementById('otto-injected-blocks');
          if (old) old.remove();
          inject();
        }, 350);
      };

      window.addEventListener('popstate', function () {
        setTimeout(function () {
          var old = document.getElementById('otto-injected-blocks');
          if (old) old.remove();
          inject();
        }, 350);
      });
    })();
  </script>
